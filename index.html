<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary SEO (overridden per page by react-helmet-async) -->

    <meta name="description" content="FinClarity helps salaried professionals in India evaluate financial health, manage EMIs, escape debt, and plan financial independence — free, instant, no login required." />

    <meta name="author" content="FinClarity" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://finclarity.in/" />

    <!-- Open Graph -->
    <meta property="og:title" content="FinClarity — Master Your Money in 60 Seconds" />
    <meta property="og:description" content="Free financial tools for Indian salaried professionals. Health score, EMI checker, debt planner, emergency fund & FI tracker." />

    <meta property="og:url" content="https://finclarity.in/" />
    <meta property="og:image" content="https://finclarity.in/og-image.png" />

    <meta property="og:locale" content="en_IN" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F4C81" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Favicon -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
